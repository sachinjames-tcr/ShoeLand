{% extends "base.html" %}
{% block title %}Password Reset Complete | {{ SITE_NAME }}{% endblock %}
{% block content %}
<section class="section text-center" style="min-height:55vh; display:flex; align-items:center;">
  <div class="container">
    <i class="bi bi-check-circle-fill" style="font-size:4rem; color:var(--c-success);"></i>
    <h3 class="mt-3">Password Reset Successfully</h3>
    <p class="text-muted">You can now log in with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-shoeland mt-2">Login Now</a>
  </div>
</section>
{% endblock %}
