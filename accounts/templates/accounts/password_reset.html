{% extends "base.html" %}
{% block title %}Forgot Password | {{ SITE_NAME }}{% endblock %}
{% block content %}
<section class="section auth-wrap">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="auth-card">
          <h3 class="mb-2">Forgot Your Password?</h3>
          <p class="text-muted mb-4">Enter your email and we'll send you a link to reset it.</p>
          <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              {{ form.email }}
            </div>
            <button type="submit" class="btn btn-shoeland w-100">Send Reset Link <i class="bi bi-envelope"></i></button>
          </form>
          <p class="text-center mt-3 mb-0 small"><a href="{% url 'accounts:login' %}" class="text-orange">Back to Login</a></p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
