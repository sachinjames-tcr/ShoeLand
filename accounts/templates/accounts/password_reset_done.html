{% extends "base.html" %}
{% block title %}Check Your Email | {{ SITE_NAME }}{% endblock %}
{% block content %}
<section class="section text-center" style="min-height:55vh; display:flex; align-items:center;">
  <div class="container">
    <i class="bi bi-envelope-check" style="font-size:4rem; color:var(--c-orange);"></i>
    <h3 class="mt-3">Check Your Email</h3>
    <p class="text-muted">We've emailed you instructions for setting a new password, if an account exists with that email.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-shoeland mt-2">Back to Login</a>
  </div>
</section>
{% endblock %}
