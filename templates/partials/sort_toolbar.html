<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <span class="text-muted small">{{ page_obj.paginator.count }} product{{ page_obj.paginator.count|pluralize }} found</span>
  <form method="get" class="d-flex align-items-center gap-2" id="sortForm">
    {% for key, values in request.GET.lists %}
      {% if key != 'sort' and key != 'page' %}
        {% for v in values %}<input type="hidden" name="{{ key }}" value="{{ v }}">{% endfor %}
      {% endif %}
    {% endfor %}
    <label class="small text-muted mb-0">Sort by</label>
    <select name="sort" class="form-select form-select-sm" style="width:auto;" onchange="this.form.submit()">
      <option value="latest" {% if current_sort == "latest" %}selected{% endif %}>Latest</option>
      <option value="price_low" {% if current_sort == "price_low" %}selected{% endif %}>Price: Low to High</option>
      <option value="price_high" {% if current_sort == "price_high" %}selected{% endif %}>Price: High to Low</option>
      <option value="best_selling" {% if current_sort == "best_selling" %}selected{% endif %}>Best Selling</option>
      <option value="top_rated" {% if current_sort == "top_rated" %}selected{% endif %}>Highest Rated</option>
    </select>
  </form>
</div>
